<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BếpNgon ⚙️ — Quản trị viên</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --orange:#FF6B35;--orange-light:#FFF0EB;--orange-dark:#CC4A15;
  --navy:#1A1A2E;--navy-mid:#16213E;--navy-light:#0F3460;
  --green:#27AE60;--green-light:#E8F8EF;
  --red:#E74C3C;--red-light:#FDECEA;
  --blue:#2980B9;--blue-light:#EBF5FB;
  --yellow:#F39C12;--yellow-light:#FEF9E7;
  --gray:#6C757D;--gray-light:#F8F9FA;--gray-border:#E9ECEF;
  --text:#1A1A2E;--text-muted:#6C757D;
  --radius:10px;--radius-lg:16px;--radius-xl:24px;
  --shadow:0 2px 12px rgba(0,0,0,0.08);--shadow-lg:0 8px 32px rgba(0,0,0,0.12);
}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--gray-light);color:var(--text);font-size:15px;line-height:1.6;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.hidden{display:none!important}

/* TOP BAR */
.topbar{background:var(--navy);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;flex-shrink:0}
.topbar-brand{color:#fff;font-weight:800;font-size:18px}
.topbar-brand span{color:var(--orange)}
.topbar-right{display:flex;align-items:center;gap:16px}
.topbar-badge{background:var(--orange);color:#fff;font-size:13px;font-weight:700;padding:4px 14px;border-radius:50px;display:flex;align-items:center;gap:6px}
.new-order-bell{position:relative;cursor:pointer}
.bell-icon{font-size:22px}
.bell-dot{position:absolute;top:-2px;right:-2px;width:10px;height:10px;background:var(--red);border-radius:50%;display:none;border:2px solid var(--navy)}
.bell-dot.show{display:block;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* LAYOUT */
.main-layout{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:220px;background:var(--navy-mid);flex-shrink:0;padding:16px 0;overflow-y:auto}
.sidebar-section{padding:0 16px 8px;font-size:11px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,0.35);text-transform:uppercase;margin-top:16px}
.sidebar-item{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;color:rgba(255,255,255,0.65);padding:10px 16px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;transition:all .2s;border-left:3px solid transparent;text-align:left}
.sidebar-item:hover{background:rgba(255,255,255,0.07);color:#fff}
.sidebar-item.active{background:rgba(255,107,53,0.15);color:#fff;border-left-color:var(--orange)}
.sidebar-item .s-icon{font-size:16px;width:20px;text-align:center}
.sidebar-item .s-badge{margin-left:auto;background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:1px 7px;border-radius:50px;min-width:20px;text-align:center}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:28px}

/* CARDS */
.page-title{font-size:22px;font-weight:800;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:var(--radius-lg);padding:18px;box-shadow:var(--shadow)}
.stat-label{font-size:12px;color:var(--text-muted);margin-bottom:6px;font-weight:500}
.stat-value{font-size:26px;font-weight:800}
.stat-value.orange{color:var(--orange)}
.stat-value.green{color:var(--green)}
.stat-value.blue{color:var(--blue)}
.stat-value.red{color:var(--red)}

.admin-card{background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px}
.admin-card-header{padding:16px 20px;border-bottom:1px solid var(--gray-border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.admin-card-header h3{font-weight:700;font-size:15px}

/* TABLE */
.data-table{width:100%;border-collapse:collapse}
.data-table th{background:var(--gray-light);padding:10px 14px;text-align:left;font-size:12px;font-weight:700;color:var(--text-muted);white-space:nowrap}
.data-table td{padding:12px 14px;border-top:1px solid var(--gray-border);font-size:13px;vertical-align:middle}
.data-table tr:hover td{background:rgba(255,107,53,0.02)}
.td-emoji{font-size:26px}
.td-name{font-weight:600}
.td-price{font-weight:700;color:var(--orange)}
.td-actions{display:flex;gap:5px;flex-wrap:wrap}

/* BUTTONS */
.btn{padding:6px 12px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;border:none;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--orange);color:#fff}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-info{background:var(--blue);color:#fff}
.btn-warning{background:var(--yellow);color:#fff}
.btn-purple{background:#8E44AD;color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-lg{padding:10px 20px;font-size:14px}

/* STATUS */
.status-pill{padding:3px 10px;border-radius:50px;font-size:11px;font-weight:700;white-space:nowrap}
.s-pending{background:var(--yellow-light);color:var(--yellow)}
.s-cooking{background:var(--orange-light);color:var(--orange)}
.s-delivering{background:var(--blue-light);color:var(--blue)}
.s-delivered{background:var(--green-light);color:var(--green)}
.s-cancelled{background:var(--red-light);color:var(--red)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#fff;border-radius:var(--radius-xl);padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-box h3{font-size:18px;font-weight:800;margin-bottom:20px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.btn-cancel{background:none;border:1.5px solid var(--gray-border);padding:8px 18px;border-radius:var(--radius);cursor:pointer;font-family:inherit;font-size:13px;font-weight:600}

/* FORM */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-weight:600;font-size:13px;margin-bottom:5px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 12px;border:1.5px solid var(--gray-border);border-radius:var(--radius);font-family:inherit;font-size:14px;transition:border .2s;background:#fff}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:var(--orange)}
.form-group textarea{height:72px;resize:vertical}

.emoji-picker{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:6px}
.emoji-opt{background:var(--gray-light);border:2px solid transparent;border-radius:8px;padding:6px;font-size:22px;cursor:pointer;text-align:center;transition:all .2s}
.emoji-opt.selected{border-color:var(--orange);background:var(--orange-light)}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:12px 20px;border-radius:var(--radius);font-size:14px;font-weight:600;z-index:500;transition:all .3s;opacity:0;transform:translateY(10px);pointer-events:none;max-width:300px}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:var(--green)}
.toast.warning{background:var(--yellow)}
.toast.new-order{background:var(--orange)}

/* NEW ORDER NOTIFICATION */
.new-order-banner{background:linear-gradient(135deg,var(--orange),var(--orange-dark));color:#fff;padding:14px 20px;border-radius:var(--radius-lg);margin-bottom:20px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:0 4px 20px rgba(255,107,53,0.3)}
.new-order-banner .nob-icon{font-size:28px}
.new-order-banner .nob-text{flex:1}
.new-order-banner .nob-title{font-weight:800;font-size:15px}
.new-order-banner .nob-sub{font-size:12px;opacity:.85}

/* ORDER DETAIL IN MODAL */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.detail-group .detail-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.detail-group .detail-value{font-size:14px;font-weight:600}
.order-item-chip{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px}
.oi-emoji{font-size:22px}
.oi-name{flex:1;font-weight:500}
.oi-price{font-weight:700;color:var(--orange)}

/* PRODUCT BADGE */
.product-badge{background:var(--green);color:#fff;font-size:10px;font-weight:600;padding:1px 7px;border-radius:50px;margin-left:6px}

/* SHIPPER CARD */
.shipper-assign-card{background:var(--blue-light);border-radius:var(--radius-lg);padding:16px;margin-bottom:20px}
.shipper-assign-card h4{color:var(--blue);font-weight:700;margin-bottom:12px;font-size:14px}

/* REFRESH INDICATOR */
.refresh-dot{width:8px;height:8px;background:var(--green);border-radius:50%;display:inline-block;margin-right:6px;animation:pulse 2s infinite}

@media(max-width:768px){
  .sidebar{display:none}
  .stats-row{grid-template-columns:1fr 1fr}
  .detail-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-brand">Bếp<span>Ngon</span> ⚙️ <span style="font-size:12px;opacity:.5;font-weight:400;margin-left:8px">Quản trị viên</span></div>
  <div class="topbar-right">
    <div style="color:rgba(255,255,255,0.5);font-size:13px"><span class="refresh-dot"></span>Đang đồng bộ live</div>
    <div class="new-order-bell" onclick="goToOrders()">
      <span class="bell-icon">🔔</span>
      <div class="bell-dot" id="bellDot"></div>
    </div>
    <span class="topbar-badge" id="pendingBadge">0 đơn chờ</span>
  </div>
</div>

<div class="main-layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">Tổng quan</div>
    <button class="sidebar-item active" onclick="showSection('dashboard')"><span class="s-icon">📊</span> Dashboard</button>
    <div class="sidebar-section">Quản lý</div>
    <button class="sidebar-item" onclick="showSection('orders')"><span class="s-icon">📋</span> Đơn hàng <span class="s-badge" id="sidebarPendingBadge" style="display:none">0</span></button>
    <button class="sidebar-item" onclick="showSection('shipping')"><span class="s-icon">🚴</span> Giao hàng</button>
    <button class="sidebar-item" onclick="showSection('products')"><span class="s-icon">🍜</span> Sản phẩm</button>
  </div>

  <!-- CONTENT -->
  <div class="content" id="mainContent"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal-box" id="modalBox"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ====== CONSTANTS ======
const STORAGE_KEY = 'bepngon_orders';
const PRODUCTS_KEY = 'bepngon_products';
const STATUSES = {
  pending:    {label:'Chờ xác nhận',    cls:'s-pending',    icon:'⏳'},
  confirmed:  {label:'Đã xác nhận',     cls:'s-cooking',    icon:'✅'},
  cooking:    {label:'Đang nấu',         cls:'s-cooking',    icon:'👨‍🍳'},
  shipper:    {label:'Shipper đã nhận',  cls:'s-delivering', icon:'🚴'},
  delivering: {label:'Đang giao hàng',   cls:'s-delivering', icon:'📦'},
  delivered:  {label:'Đã giao',          cls:'s-delivered',  icon:'🎉'},
  cancelled:  {label:'Đã huỷ',           cls:'s-cancelled',  icon:'❌'}
};

const DEFAULT_PRODUCTS = [
  {id:1, name:'Phở Bò Tái',         desc:'Phở Nam bộ truyền thống, nước dùng 8 tiếng',    price:65000, emoji:'🍜', cat:'Phở & Bún',    badge:'Bán chạy'},
  {id:2, name:'Bún Bò Huế',         desc:'Cay nồng đặc trưng, thịt bò mềm',               price:55000, emoji:'🍲', cat:'Phở & Bún',    badge:''},
  {id:3, name:'Cơm Tấm Sườn',       desc:'Sườn nướng than hoa, cơm tấm dẻo thơm',         price:70000, emoji:'🍚', cat:'Cơm',          badge:'Bán chạy'},
  {id:4, name:'Cơm Gà Hội An',      desc:'Gà ta luộc, cơm nấu nước dùng gà',              price:75000, emoji:'🍗', cat:'Cơm',          badge:''},
  {id:5, name:'Bánh Mì Thịt Nướng', desc:'Bánh mì nóng giòn, thịt nướng mật ong',         price:35000, emoji:'🥖', cat:'Bánh mì',      badge:'Mới'},
  {id:6, name:'Hủ Tiếu Nam Vang',   desc:'Hủ tiếu dai, thịt băm, tôm tươi',               price:60000, emoji:'🍝', cat:'Phở & Bún',    badge:''},
  {id:7, name:'Bò Lúc Lắc',         desc:'Bò Mỹ thăn lưng, xào hành tây',                 price:120000,emoji:'🥩', cat:'Món xào',      badge:'Premium'},
  {id:8, name:'Trà Sữa Trân Châu',  desc:'Trà sữa Đài Loan, trân châu đường đen',          price:45000, emoji:'🧋', cat:'Đồ uống',      badge:''},
  {id:9, name:'Nước Mía Sầu Riêng', desc:'Nước mía tươi kết hợp sầu riêng nguyên chất',   price:35000, emoji:'🥤', cat:'Đồ uống',      badge:''},
  {id:10,name:'Gỏi Cuốn Tôm Thịt', desc:'Gỏi cuốn tươi, tôm sú, thịt luộc, rau thơm',   price:50000, emoji:'🌯', cat:'Khai vị',      badge:''},
  {id:11,name:'Chả Giò Rế',         desc:'Chả giò giòn rụm, nhân thịt cua',               price:55000, emoji:'🥟', cat:'Khai vị',      badge:'Bán chạy'},
  {id:12,name:'Chè Đậu Xanh',       desc:'Chè đậu xanh nấu cốt dừa, ăn nóng hoặc lạnh',  price:25000, emoji:'🍧', cat:'Tráng miệng',  badge:''},
];

// ====== STATE ======
let currentSection = 'dashboard';
let newOrderIds = new Set();
let lastOrderCount = 0;

// ====== STORAGE ======
function getOrders(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); }catch(e){return [];} }
function saveOrders(orders){ localStorage.setItem(STORAGE_KEY, JSON.stringify(orders)); }
function getProducts(){ try{ return JSON.parse(localStorage.getItem(PRODUCTS_KEY)||'null') || DEFAULT_PRODUCTS; }catch(e){ return DEFAULT_PRODUCTS; } }
function saveProducts(p){ localStorage.setItem(PRODUCTS_KEY, JSON.stringify(p)); }

// ====== UTILS ======
function fmt(n){ return new Intl.NumberFormat('vi-VN').format(n) + 'đ'; }
function timestamp(){ return new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}); }
function showToast(msg, type=''){
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast'+(type?' '+type:'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}
function openModal(html){ document.getElementById('modalBox').innerHTML=html; document.getElementById('modalOverlay').classList.remove('hidden'); }
function closeModal(){ document.getElementById('modalOverlay').classList.add('hidden'); }

// ====== SECTION NAV ======
function showSection(sec){
  currentSection = sec;
  document.querySelectorAll('.sidebar-item').forEach(b=>b.classList.remove('active'));
  const secMap = {dashboard:0, orders:1, shipping:2, products:3};
  document.querySelectorAll('.sidebar-item')[secMap[sec]]?.classList.add('active');
  renderSection();
  if(sec==='orders') newOrderIds.clear();
  updateBadges();
}

function goToOrders(){ showSection('orders'); }

function renderSection(){
  const map = {dashboard:renderDashboard, orders:renderOrders, shipping:renderShipping, products:renderProducts};
  (map[currentSection]||renderDashboard)();
}

function updateBadges(){
  const orders = getOrders();
  const pending = orders.filter(o=>o.status==='pending').length;
  document.getElementById('pendingBadge').textContent = pending + ' đơn chờ';
  const sb = document.getElementById('sidebarPendingBadge');
  if(pending>0){ sb.style.display='inline'; sb.textContent=pending; }
  else { sb.style.display='none'; }
  const bell = document.getElementById('bellDot');
  if(newOrderIds.size>0) bell.classList.add('show');
  else bell.classList.remove('show');
}

// ====== DASHBOARD ======
function renderDashboard(){
  const orders = getOrders();
  const pending = orders.filter(o=>o.status==='pending').length;
  const cooking = orders.filter(o=>['confirmed','cooking'].includes(o.status)).length;
  const delivering = orders.filter(o=>['shipper','delivering'].includes(o.status)).length;
  const delivered = orders.filter(o=>o.status==='delivered').length;
  const revenue = orders.filter(o=>o.status!=='cancelled').reduce((s,o)=>s+o.items.reduce((ss,i)=>ss+i.price*i.qty,0)+20000,0);
  
  const newBanners = [...newOrderIds].map(id=>{
    const o = orders.find(x=>x.id===id);
    if(!o) return '';
    const total = o.items.reduce((s,i)=>s+i.price*i.qty,0)+20000;
    return `<div class="new-order-banner" onclick="openOrderModal('${id}')">
      <div class="nob-icon">🔔</div>
      <div class="nob-text"><div class="nob-title">Đơn mới: ${id} — ${o.customer}</div><div class="nob-sub">${o.items.map(i=>i.emoji+' '+i.name).join(', ')} • ${fmt(total)}</div></div>
      <div style="font-size:13px;font-weight:700;padding:6px 14px;background:rgba(255,255,255,0.2);border-radius:6px">Xử lý →</div>
    </div>`;
  }).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="page-title">📊 Dashboard</div>
    ${newBanners}
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">⏳ Chờ xác nhận</div><div class="stat-value orange">${pending}</div></div>
      <div class="stat-card"><div class="stat-label">👨‍🍳 Đang nấu</div><div class="stat-value" style="color:#E67E22">${cooking}</div></div>
      <div class="stat-card"><div class="stat-label">🚴 Đang giao</div><div class="stat-value blue">${delivering}</div></div>
      <div class="stat-card"><div class="stat-label">✅ Đã giao hôm nay</div><div class="stat-value green">${delivered}</div></div>
      <div class="stat-card"><div class="stat-label">💰 Doanh thu</div><div class="stat-value green" style="font-size:18px">${fmt(revenue)}</div></div>
    </div>
    <div class="admin-card">
      <div class="admin-card-header">
        <h3>Đơn hàng gần nhất</h3>
        <button class="btn btn-primary btn-lg" onclick="showSection('orders')">Xem tất cả →</button>
      </div>
      <table class="data-table">
        <thead><tr><th>Mã đơn</th><th>Khách</th><th>Món</th><th>Tổng</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
        <tbody>${orders.slice(0,6).map(o=>{
          const s = STATUSES[o.status];
          const total = o.items.reduce((ss,i)=>ss+i.price*i.qty,0)+20000;
          return `<tr>
            <td><strong>${o.id}</strong><br><span style="font-size:11px;color:var(--text-muted)">${o.time}</span></td>
            <td>${o.customer}</td>
            <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.items.map(i=>i.emoji+' '+i.name).join(', ')}</td>
            <td class="td-price">${fmt(total)}</td>
            <td><span class="status-pill ${s.cls}">${s.icon} ${s.label}</span></td>
            <td><button class="btn btn-info btn-sm" onclick="openOrderModal('${o.id}')">Xem</button></td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>
  `;
}

// ====== ORDERS ======
function renderOrders(){
  const orders = getOrders();
  const filterBtns = ['Tất cả','pending','confirmed','cooking','shipper','delivering','delivered','cancelled'];
  
  document.getElementById('mainContent').innerHTML = `
    <div class="page-title">📋 Quản lý đơn hàng <span style="font-size:14px;font-weight:500;color:var(--text-muted)">(${orders.length} đơn)</span></div>
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      ${filterBtns.map((f,i)=>{
        const label = f==='Tất cả'?'Tất cả':`${STATUSES[f]?.icon} ${STATUSES[f]?.label}`;
        const count = f==='Tất cả'?orders.length:orders.filter(o=>o.status===f).length;
        return `<button onclick="filterOrderTable('${f}')" id="filter-${f}" class="btn ${i===0?'btn-primary':'btn-sm'}" style="border:1.5px solid var(--gray-border);${i!==0?'background:#fff;color:var(--text);':''}">${label} <span style="opacity:.7">(${count})</span></button>`;
      }).join('')}
    </div>
    <div class="admin-card">
      <table class="data-table" id="ordersTable">
        <thead><tr><th>Mã đơn</th><th>Khách hàng</th><th>Địa chỉ</th><th>Món đặt</th><th>Tổng</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
        <tbody id="ordersTableBody">${renderOrderRows(orders)}</tbody>
      </table>
    </div>
  `;
}

function filterOrderTable(filter){
  const orders = getOrders();
  const filtered = filter==='Tất cả' ? orders : orders.filter(o=>o.status===filter);
  document.getElementById('ordersTableBody').innerHTML = renderOrderRows(filtered);
}

function renderOrderRows(orders){
  if(orders.length===0) return `<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted)">Không có đơn hàng nào</td></tr>`;
  return orders.map(o=>{
    const s = STATUSES[o.status];
    const total = o.items.reduce((ss,i)=>ss+i.price*i.qty,0)+20000;
    const isNew = newOrderIds.has(o.id);
    return `<tr style="${isNew?'background:rgba(255,107,53,0.05);':''}">
      <td><strong>${o.id}</strong>${isNew?` <span style="background:var(--red);color:#fff;font-size:10px;padding:1px 6px;border-radius:50px">MỚI</span>`:''}<br><span style="font-size:11px;color:var(--text-muted)">${o.time}</span></td>
      <td><div style="font-weight:600">${o.customer}</div><div style="font-size:11px;color:var(--text-muted)">${o.phone}</div></td>
      <td style="max-width:150px;font-size:12px">📍 ${o.address}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px">${o.items.map(i=>i.emoji+' '+i.name).join(', ')}</td>
      <td class="td-price">${fmt(total)}</td>
      <td><span class="status-pill ${s.cls}">${s.icon} ${s.label}</span></td>
      <td class="td-actions">
        <button class="btn btn-info btn-sm" onclick="openOrderModal('${o.id}')">Chi tiết</button>
        ${o.status==='pending'?`<button class="btn btn-success btn-sm" onclick="quickStatus('${o.id}','confirmed')">Xác nhận</button>`:''}
        ${o.status==='confirmed'?`<button class="btn btn-warning btn-sm" onclick="quickStatus('${o.id}','cooking')">Nấu</button>`:''}
        ${!['delivered','cancelled'].includes(o.status)?`<button class="btn btn-danger btn-sm" onclick="quickStatus('${o.id}','cancelled')">Huỷ</button>`:''}
      </td>
    </tr>`;
  }).join('');
}

function quickStatus(id, status){
  updateStatus(id, status);
  renderSection();
}

// ====== ORDER MODAL ======
function openOrderModal(id){
  const orders = getOrders();
  const o = orders.find(x=>x.id===id);
  if(!o) return;
  const total = o.items.reduce((ss,i)=>ss+i.price*i.qty,0)+20000;
  const s = STATUSES[o.status];
  
  openModal(`
    <h3>Chi tiết đơn ${o.id} <span class="status-pill ${s.cls}">${s.icon} ${s.label}</span></h3>
    <div class="detail-grid">
      <div class="detail-group"><div class="detail-label">Khách hàng</div><div class="detail-value">${o.customer}</div></div>
      <div class="detail-group"><div class="detail-label">Điện thoại</div><div class="detail-value">${o.phone}</div></div>
      <div class="detail-group" style="grid-column:1/-1"><div class="detail-label">Địa chỉ giao hàng</div><div class="detail-value">📍 ${o.address}</div></div>
      ${o.note?`<div class="detail-group" style="grid-column:1/-1"><div class="detail-label">Ghi chú</div><div class="detail-value" style="color:var(--orange)">"${o.note}"</div></div>`:''}
    </div>
    <div style="border-top:1px solid var(--gray-border);padding:14px 0;margin-bottom:14px">
      ${o.items.map(i=>`<div class="order-item-chip"><span class="oi-emoji">${i.emoji}</span><span class="oi-name">${i.name} × ${i.qty}</span><span class="oi-price">${fmt(i.price*i.qty)}</span></div>`).join('')}
      <div style="border-top:1px solid var(--gray-border);padding-top:10px;margin-top:8px;display:flex;justify-content:space-between;font-weight:700;font-size:15px">
        <span>Tổng cộng</span><span style="color:var(--orange)">${fmt(total)}</span>
      </div>
    </div>
    <div class="form-group">
      <label>Cập nhật trạng thái đơn hàng</label>
      <select id="statusModal" style="padding:10px;font-family:inherit;font-size:14px;border:1.5px solid var(--gray-border);border-radius:var(--radius);width:100%;background:#fff">
        ${Object.entries(STATUSES).map(([k,v])=>`<option value="${k}"${o.status===k?' selected':''}>${v.icon} ${v.label}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label>Tên shipper</label>
      <input type="text" id="shipperModal" value="${o.shipper||''}" placeholder="Nhập tên shipper để giao hàng...">
    </div>
    <div style="background:var(--blue-light);padding:12px;border-radius:var(--radius);font-size:12px;color:var(--blue);margin-bottom:4px">
      💡 Khi lưu, bên khách hàng sẽ thấy trạng thái mới ngay lập tức (cập nhật mỗi 2 giây).
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Đóng</button>
      <button class="btn btn-success btn-lg" onclick="saveOrderModal('${id}')">💾 Lưu thay đổi</button>
    </div>
  `);
}

function saveOrderModal(id){
  const newStatus = document.getElementById('statusModal').value;
  const shipper = document.getElementById('shipperModal').value.trim();
  updateStatus(id, newStatus, shipper);
  closeModal();
  renderSection();
  showToast(`✅ Đơn ${id} → ${STATUSES[newStatus].label}`, 'success');
}

function updateStatus(id, status, shipper){
  const orders = getOrders();
  const o = orders.find(x=>x.id===id);
  if(!o) return;
  o.status = status;
  if(shipper !== undefined) o.shipper = shipper;
  if(!o.statusHistory) o.statusHistory = [];
  if(!o.statusHistory.find(h=>h.status===status)){
    o.statusHistory.push({status, time: timestamp()});
  }
  saveOrders(orders);
  updateBadges();
}

// ====== SHIPPING ======
function renderShipping(){
  const orders = getOrders();
  const needsShipper = orders.filter(o=>['cooking','confirmed'].includes(o.status));
  const onTheWay = orders.filter(o=>['shipper','delivering'].includes(o.status));
  const donedToday = orders.filter(o=>o.status==='delivered');

  document.getElementById('mainContent').innerHTML = `
    <div class="page-title">🚴 Quản lý giao hàng</div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">⏳ Cần phân công shipper</div><div class="stat-value orange">${needsShipper.length}</div></div>
      <div class="stat-card"><div class="stat-label">🏍️ Đang trên đường</div><div class="stat-value blue">${onTheWay.length}</div></div>
      <div class="stat-card"><div class="stat-label">✅ Giao thành công</div><div class="stat-value green">${donedToday.length}</div></div>
    </div>

    ${needsShipper.length>0?`
    <div class="admin-card">
      <div class="admin-card-header"><h3>⚡ Cần điều phối shipper (${needsShipper.length})</h3></div>
      <table class="data-table">
        <thead><tr><th>Mã đơn</th><th>Khách hàng</th><th>Địa chỉ giao</th><th>Trạng thái</th><th>Phân công shipper</th></tr></thead>
        <tbody>${needsShipper.map(o=>`<tr>
          <td><strong>${o.id}</strong></td>
          <td>${o.customer}<br><span style="font-size:11px;color:var(--text-muted)">${o.phone}</span></td>
          <td style="font-size:12px">📍 ${o.address}</td>
          <td><span class="status-pill ${STATUSES[o.status].cls}">${STATUSES[o.status].icon} ${STATUSES[o.status].label}</span></td>
          <td>
            <div style="display:flex;gap:6px;align-items:center">
              <input type="text" id="sh-${o.id}" value="${o.shipper||''}" placeholder="Tên shipper..." style="padding:6px 10px;border:1.5px solid var(--gray-border);border-radius:6px;font-size:13px;width:140px;font-family:inherit">
              <button class="btn btn-success btn-sm" onclick="assignAndDispatch('${o.id}')">🚴 Giao</button>
            </div>
          </td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`:''}

    ${onTheWay.length>0?`
    <div class="admin-card">
      <div class="admin-card-header"><h3>🏍️ Đơn đang giao (${onTheWay.length})</h3></div>
      <table class="data-table">
        <thead><tr><th>Mã đơn</th><th>Khách hàng</th><th>Địa chỉ</th><th>Shipper</th><th>Trạng thái</th><th>Hành động</th></tr></thead>
        <tbody>${onTheWay.map(o=>`<tr>
          <td><strong>${o.id}</strong></td>
          <td>${o.customer}</td>
          <td style="font-size:12px">📍 ${o.address}</td>
          <td>🚴 <strong>${o.shipper||'Chưa phân công'}</strong></td>
          <td><span class="status-pill ${STATUSES[o.status].cls}">${STATUSES[o.status].icon} ${STATUSES[o.status].label}</span></td>
          <td class="td-actions">
            ${o.status==='shipper'?`<button class="btn btn-warning btn-sm" onclick="quickStatus('${o.id}','delivering')">📦 Đang giao</button>`:''}
            <button class="btn btn-success btn-sm" onclick="quickStatus('${o.id}','delivered')">✅ Giao xong</button>
          </td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`:''}

    ${needsShipper.length===0&&onTheWay.length===0?`
    <div style="text-align:center;padding:80px 0;color:var(--text-muted)">
      <div style="font-size:56px;margin-bottom:16px">😴</div>
      <p style="font-size:18px;font-weight:700">Không có đơn nào đang hoạt động</p>
      <p style="margin-top:6px">Tất cả đơn đã được xử lý xong!</p>
    </div>`:''}
  `;
}

function assignAndDispatch(id){
  const name = document.getElementById('sh-'+id)?.value.trim();
  if(!name){ showToast('Nhập tên shipper trước!', 'warning'); return; }
  updateStatus(id, 'shipper', name);
  renderSection();
  showToast(`🚴 Đã giao cho shipper ${name}`, 'success');
}

// ====== PRODUCTS ======
function renderProducts(){
  const products = getProducts();
  document.getElementById('mainContent').innerHTML = `
    <div class="page-title">🍜 Quản lý sản phẩm <span style="font-size:14px;font-weight:500;color:var(--text-muted)">(${products.length} món)</span></div>
    <div class="admin-card">
      <div class="admin-card-header">
        <h3>Danh sách sản phẩm</h3>
        <button class="btn btn-primary btn-lg" onclick="openAddProduct()">+ Thêm sản phẩm</button>
      </div>
      <table class="data-table">
        <thead><tr><th>Icon</th><th>Tên món</th><th>Danh mục</th><th>Mô tả</th><th>Giá</th><th>Thao tác</th></tr></thead>
        <tbody id="productsBody">${renderProductRows(products)}</tbody>
      </table>
    </div>
  `;
}

function renderProductRows(products){
  return products.map(p=>`
    <tr>
      <td class="td-emoji">${p.emoji}</td>
      <td class="td-name">${p.name}${p.badge?`<span class="product-badge">${p.badge}</span>`:''}</td>
      <td style="font-size:12px;color:var(--text-muted)">${p.cat}</td>
      <td style="font-size:12px;color:var(--text-muted);max-width:180px">${p.desc}</td>
      <td class="td-price">${fmt(p.price)}</td>
      <td class="td-actions">
        <button class="btn btn-info btn-sm" onclick="openEditProduct(${p.id})">✏️ Sửa</button>
        <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">🗑 Xoá</button>
      </td>
    </tr>
  `).join('');
}

function openAddProduct(){
  const products = getProducts();
  const cats = [...new Set(products.map(p=>p.cat))];
  const emojis = ['🍜','🍲','🍚','🍗','🥖','🍝','🥩','🧋','🥤','🌯','🥟','🍧','🍛','🥗','🍤','🍱','🥘','🍣','🧆','🥙'];
  openModal(`
    <h3>+ Thêm sản phẩm mới</h3>
    <div class="form-group"><label>Tên món</label><input type="text" id="ap-name" placeholder="VD: Phở Bò Tái"></div>
    <div class="form-group"><label>Mô tả</label><input type="text" id="ap-desc" placeholder="Mô tả ngắn..."></div>
    <div class="form-group"><label>Giá (VNĐ)</label><input type="number" id="ap-price" placeholder="65000"></div>
    <div class="form-group"><label>Danh mục</label>
      <select id="ap-cat" onchange="toggleNewCat('ap')"><option value="">Chọn...</option>${cats.map(c=>`<option>${c}</option>`).join('')}<option value="__new__">+ Danh mục mới...</option></select>
    </div>
    <div class="form-group hidden" id="ap-newcat-group"><label>Tên danh mục mới</label><input type="text" id="ap-newcat"></div>
    <div class="form-group"><label>Nhãn</label><input type="text" id="ap-badge" placeholder="Bán chạy / Mới / Premium (bỏ trống nếu không có)"></div>
    <div class="form-group"><label>Chọn icon</label>
      <div class="emoji-picker">${emojis.map((e,i)=>`<div class="emoji-opt${i===0?' selected':''}" onclick="pickEmoji(this,'ap-emoji','ap')">${e}</div>`).join('')}</div>
      <input type="hidden" id="ap-emoji" value="${emojis[0]}">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Huỷ</button>
      <button class="btn btn-primary btn-lg" onclick="saveNewProduct()">Lưu sản phẩm</button>
    </div>
  `);
}

function toggleNewCat(prefix){
  const val = document.getElementById(prefix+'-cat').value;
  const g = document.getElementById(prefix+'-newcat-group');
  g.classList.toggle('hidden', val!=='__new__');
}

function pickEmoji(el, inputId, prefix){
  document.querySelectorAll(`#modalBox .emoji-opt`).forEach(x=>x.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById(inputId).value = el.textContent.trim();
}

function saveNewProduct(){
  const name = document.getElementById('ap-name').value.trim();
  const desc = document.getElementById('ap-desc').value.trim();
  const price = parseInt(document.getElementById('ap-price').value);
  let cat = document.getElementById('ap-cat').value;
  if(cat==='__new__') cat = document.getElementById('ap-newcat').value.trim();
  const emoji = document.getElementById('ap-emoji').value;
  const badge = document.getElementById('ap-badge').value.trim();
  if(!name||!price||!cat){ showToast('Điền đầy đủ thông tin!','warning'); return; }
  const products = getProducts();
  const newId = Math.max(...products.map(p=>p.id), 0) + 1;
  products.push({id:newId, name, desc, price, emoji, cat, badge});
  saveProducts(products);
  closeModal();
  renderProducts();
  showToast('✅ Đã thêm sản phẩm mới!','success');
}

function openEditProduct(id){
  const products = getProducts();
  const p = products.find(x=>x.id===id);
  if(!p) return;
  const cats = [...new Set(products.map(x=>x.cat))];
  const emojis = ['🍜','🍲','🍚','🍗','🥖','🍝','🥩','🧋','🥤','🌯','🥟','🍧','🍛','🥗','🍤','🍱','🥘','🍣','🧆','🥙'];
  openModal(`
    <h3>✏️ Sửa: ${p.name}</h3>
    <div class="form-group"><label>Tên món</label><input type="text" id="ep-name" value="${p.name}"></div>
    <div class="form-group"><label>Mô tả</label><input type="text" id="ep-desc" value="${p.desc}"></div>
    <div class="form-group"><label>Giá (VNĐ)</label><input type="number" id="ep-price" value="${p.price}"></div>
    <div class="form-group"><label>Danh mục</label>
      <select id="ep-cat">${cats.map(c=>`<option${c===p.cat?' selected':''}>${c}</option>`).join('')}</select>
    </div>
    <div class="form-group"><label>Nhãn</label><input type="text" id="ep-badge" value="${p.badge||''}"></div>
    <div class="form-group"><label>Icon</label>
      <div class="emoji-picker">${emojis.map(e=>`<div class="emoji-opt${e===p.emoji?' selected':''}" onclick="pickEmoji(this,'ep-emoji','ep')">${e}</div>`).join('')}</div>
      <input type="hidden" id="ep-emoji" value="${p.emoji}">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Huỷ</button>
      <button class="btn btn-primary btn-lg" onclick="saveEditProduct(${id})">💾 Lưu thay đổi</button>
    </div>
  `);
}

function saveEditProduct(id){
  const products = getProducts();
  const p = products.find(x=>x.id===id);
  if(!p) return;
  p.name = document.getElementById('ep-name').value.trim();
  p.desc = document.getElementById('ep-desc').value.trim();
  p.price = parseInt(document.getElementById('ep-price').value);
  p.cat = document.getElementById('ep-cat').value;
  p.badge = document.getElementById('ep-badge').value.trim();
  p.emoji = document.getElementById('ep-emoji').value;
  saveProducts(products);
  closeModal();
  renderProducts();
  showToast('✅ Đã cập nhật sản phẩm!','success');
}

function deleteProduct(id){
  if(!confirm('Xoá sản phẩm này khỏi menu?')) return;
  const products = getProducts().filter(p=>p.id!==id);
  saveProducts(products);
  renderProducts();
  showToast('Đã xoá sản phẩm!');
}

// ====== LIVE POLLING (detect new orders from customer) ======
let pollingOrders = [];

function pollForNewOrders(){
  const orders = getOrders();
  // Detect newly added orders
  const currentIds = new Set(orders.map(o=>o.id));
  const prevIds = new Set(pollingOrders.map(o=>o.id));
  
  let hasNew = false;
  orders.forEach(o=>{
    if(!prevIds.has(o.id)){
      newOrderIds.add(o.id);
      hasNew = true;
    }
  });
  
  if(hasNew && pollingOrders.length > 0){
    const count = [...newOrderIds].length;
    showToast(`🔔 Có ${count} đơn hàng mới!`, 'new-order');
    document.getElementById('bellDot').classList.add('show');
  }
  
  pollingOrders = orders;
  updateBadges();
  
  // Auto-refresh current view if on orders or shipping
  if(currentSection === 'dashboard') renderDashboard();
  else if(currentSection === 'orders') renderOrders();
  else if(currentSection === 'shipping') renderShipping();
}

// Listen for storage events (cross-tab from customer page)
window.addEventListener('storage', (e)=>{
  if(e.key === STORAGE_KEY || e.key === 'bepngon_new_order'){
    pollForNewOrders();
  }
});

// Also poll every 3 seconds as fallback
setInterval(pollForNewOrders, 3000);

// ====== INIT ======
pollingOrders = getOrders();
renderDashboard();
updateBadges();
</script>
</body>
