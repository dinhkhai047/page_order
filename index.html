<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BếpNgon 🍜 — Đặt đồ ăn online</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --orange:#FF6B35;--orange-light:#FFF0EB;--orange-dark:#CC4A15;
  --navy:#1A1A2E;--cream:#FFFBF5;
  --green:#27AE60;--green-light:#E8F8EF;
  --red:#E74C3C;--red-light:#FDECEA;
  --blue:#2980B9;--blue-light:#EBF5FB;
  --yellow:#F39C12;--yellow-light:#FEF9E7;
  --gray:#6C757D;--gray-light:#F8F9FA;--gray-border:#E9ECEF;
  --text:#1A1A2E;--text-muted:#6C757D;
  --radius:10px;--radius-lg:16px;--radius-xl:24px;
  --shadow:0 2px 12px rgba(0,0,0,0.08);--shadow-lg:0 8px 32px rgba(0,0,0,0.12);
}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--cream);color:var(--text);font-size:15px;line-height:1.6}
.hidden{display:none!important}

nav{background:var(--navy);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
.nav-brand{color:#fff;font-weight:800;font-size:20px}
.nav-brand span{color:var(--orange)}
.nav-tabs{display:flex;gap:4px}
.nav-tab{background:none;border:none;color:rgba(255,255,255,0.6);padding:8px 16px;border-radius:var(--radius);cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;transition:all .2s}
.nav-tab.active{background:var(--orange);color:#fff}
.nav-tab:hover:not(.active){background:rgba(255,255,255,0.1);color:#fff}
.nav-cart{background:var(--orange);border:none;color:#fff;padding:8px 16px;border-radius:var(--radius);cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;transition:all .2s}
.nav-cart:hover{background:var(--orange-dark)}
.cart-badge{background:#fff;color:var(--orange);border-radius:50%;width:20px;height:20px;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}

.page{display:none}
.page.active{display:block}

/* SHOP */
.shop-hero{background:linear-gradient(135deg,var(--navy) 0%,#2D1B69 100%);padding:48px 24px;text-align:center;color:#fff}
.shop-hero h1{font-size:36px;font-weight:800;margin-bottom:8px}
.shop-hero h1 span{color:var(--orange)}
.shop-hero p{color:rgba(255,255,255,0.7);font-size:16px}
.shop-search{max-width:400px;margin:24px auto 0;display:flex;gap:8px}
.shop-search input{flex:1;padding:12px 16px;border-radius:var(--radius);border:none;font-family:inherit;font-size:15px}
.shop-search button{background:var(--orange);color:#fff;border:none;padding:12px 20px;border-radius:var(--radius);cursor:pointer;font-weight:600;font-family:inherit}
.shop-body{max-width:1100px;margin:0 auto;padding:32px 24px}
.category-bar{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap}
.cat-btn{background:#fff;border:1.5px solid var(--gray-border);padding:8px 18px;border-radius:50px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;transition:all .2s;color:var(--text)}
.cat-btn.active,.cat-btn:hover{background:var(--orange);border-color:var(--orange);color:#fff}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px}
.product-card{background:#fff;border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s}
.product-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.product-img{height:160px;display:flex;align-items:center;justify-content:center;font-size:64px;background:var(--cream)}
.product-info{padding:16px}
.product-name{font-weight:700;font-size:16px;margin-bottom:4px}
.product-desc{color:var(--text-muted);font-size:13px;margin-bottom:12px;line-height:1.4}
.product-footer{display:flex;align-items:center;justify-content:space-between}
.product-price{font-weight:700;color:var(--orange);font-size:17px}
.btn-add{background:var(--orange);color:#fff;border:none;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.btn-add:hover{background:var(--orange-dark)}
.product-badge{background:var(--green);color:#fff;font-size:11px;font-weight:600;padding:2px 8px;border-radius:50px;margin-bottom:6px;display:inline-block}

/* CART */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:none}
.cart-overlay.open{display:block}
.cart-panel{position:fixed;right:0;top:0;bottom:0;width:380px;background:#fff;z-index:201;transform:translateX(100%);transition:transform .3s;display:flex;flex-direction:column;box-shadow:-8px 0 32px rgba(0,0,0,0.15)}
.cart-panel.open{transform:translateX(0)}
.cart-header{padding:20px 24px;border-bottom:1px solid var(--gray-border);display:flex;align-items:center;justify-content:space-between}
.cart-header h3{font-size:18px;font-weight:700}
.cart-close{background:none;border:none;cursor:pointer;font-size:22px;color:var(--text-muted)}
.cart-items{flex:1;overflow-y:auto;padding:16px 24px}
.cart-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--gray-border)}
.cart-item-emoji{font-size:36px;width:50px;text-align:center}
.cart-item-info{flex:1}
.cart-item-name{font-weight:600;font-size:14px}
.cart-item-price{color:var(--orange);font-weight:700;font-size:14px}
.cart-qty{display:flex;align-items:center;gap:8px;margin-top:6px}
.qty-btn{background:var(--gray-light);border:none;width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-weight:700}
.qty-num{font-weight:700;min-width:20px;text-align:center}
.cart-item-remove{background:none;border:none;color:var(--red);cursor:pointer;font-size:18px}
.cart-footer{padding:20px 24px;border-top:1px solid var(--gray-border)}
.cart-total{display:flex;justify-content:space-between;font-size:16px;font-weight:700;margin-bottom:16px}
.cart-total span:last-child{color:var(--orange)}
.btn-checkout{width:100%;background:var(--orange);color:#fff;border:none;padding:14px;border-radius:var(--radius);font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;transition:background .2s}
.btn-checkout:hover{background:var(--orange-dark)}
.cart-empty{text-align:center;padding:48px 0;color:var(--text-muted)}
.cart-empty .icon{font-size:48px;margin-bottom:12px}

/* CHECKOUT */
.checkout-wrap{max-width:640px;margin:40px auto;padding:0 24px}
.checkout-card{background:#fff;border-radius:var(--radius-xl);padding:32px;box-shadow:var(--shadow-lg)}
.checkout-card h2{font-size:24px;font-weight:800;margin-bottom:24px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-weight:600;font-size:14px;margin-bottom:6px}
.form-group input,.form-group textarea{width:100%;padding:12px 14px;border:1.5px solid var(--gray-border);border-radius:var(--radius);font-family:inherit;font-size:15px;transition:border .2s}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--orange)}
.form-group textarea{height:80px;resize:vertical}
.checkout-summary{background:var(--cream);border-radius:var(--radius-lg);padding:20px;margin-bottom:24px}
.checkout-summary h4{font-weight:700;margin-bottom:12px;font-size:15px}
.checkout-item-row{display:flex;justify-content:space-between;font-size:14px;margin-bottom:8px;color:var(--text-muted)}
.checkout-item-row span:last-child{font-weight:600;color:var(--text)}
.checkout-divider{border:none;border-top:1px solid var(--gray-border);margin:12px 0}
.checkout-total-row{display:flex;justify-content:space-between;font-weight:700;font-size:16px}
.checkout-total-row span:last-child{color:var(--orange)}
.btn-place{width:100%;background:var(--orange);color:#fff;border:none;padding:16px;border-radius:var(--radius);font-family:inherit;font-size:17px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px}
.btn-place:hover{background:var(--orange-dark)}
.btn-back{background:none;border:1.5px solid var(--gray-border);padding:12px 20px;border-radius:var(--radius);font-family:inherit;font-size:15px;cursor:pointer;color:var(--text-muted);margin-bottom:16px;font-weight:500}

/* TRACKING */
.tracking-wrap{max-width:680px;margin:40px auto;padding:0 24px}
.tracking-card{background:#fff;border-radius:var(--radius-xl);padding:32px;box-shadow:var(--shadow-lg);margin-bottom:24px}
.tracking-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.tracking-header h2{font-size:22px;font-weight:800}
.order-id-badge{background:var(--orange-light);color:var(--orange);font-size:13px;font-weight:700;padding:4px 12px;border-radius:50px}
.tracking-eta{background:var(--green-light);border-radius:var(--radius-lg);padding:16px 20px;display:flex;align-items:center;gap:12px;margin-bottom:28px}
.eta-icon{font-size:32px}
.eta-label{font-size:13px;color:var(--text-muted)}
.eta-time{font-size:22px;font-weight:800;color:var(--green)}
.tracking-steps{position:relative}
.tracking-step{display:flex;gap:16px;position:relative}
.tracking-step:not(:last-child)::before{content:'';position:absolute;left:19px;top:40px;width:2px;height:calc(100% - 8px);background:var(--gray-border);z-index:0}
.tracking-step.done:not(:last-child)::before{background:var(--green)}
.step-icon{width:40px;height:40px;border-radius:50%;border:2px solid var(--gray-border);display:flex;align-items:center;justify-content:center;font-size:18px;background:#fff;flex-shrink:0;z-index:1;position:relative;transition:all .4s}
.tracking-step.done .step-icon{border-color:var(--green);background:var(--green-light)}
.tracking-step.active .step-icon{border-color:var(--orange);background:var(--orange-light);box-shadow:0 0 0 4px rgba(255,107,53,0.15)}
.step-content{padding:8px 0 24px}
.step-title{font-weight:700;font-size:15px;color:var(--text-muted)}
.tracking-step.done .step-title{color:var(--green)}
.tracking-step.active .step-title{color:var(--orange)}
.step-desc{font-size:13px;color:var(--text-muted);margin-top:2px}
.step-time{font-size:12px;font-weight:600;color:var(--text-muted);margin-top:4px}
.live-badge{background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:50px;margin-left:8px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.order-items-summary{border-top:1px solid var(--gray-border);padding-top:20px}
.order-items-summary h4{font-weight:700;margin-bottom:12px}
.order-item-chip{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:14px}
.order-item-chip .oi-emoji{font-size:24px}
.order-item-chip .oi-name{flex:1;font-weight:500}
.order-item-chip .oi-price{font-weight:700;color:var(--orange)}

/* MY ORDERS */
.orders-wrap{max-width:800px;margin:40px auto;padding:0 24px}
.orders-wrap h2{font-size:26px;font-weight:800;margin-bottom:24px}
.order-row{background:#fff;border-radius:var(--radius-lg);padding:20px 24px;box-shadow:var(--shadow);margin-bottom:16px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:box-shadow .2s}
.order-row:hover{box-shadow:var(--shadow-lg)}
.order-row-info{flex:1}
.order-row-id{font-size:13px;color:var(--text-muted);font-weight:600}
.order-row-items{font-weight:600;margin:4px 0;font-size:15px}
.order-row-date{font-size:13px;color:var(--text-muted)}
.order-row-total{font-weight:800;color:var(--orange);font-size:17px;margin-right:8px}
.status-pill{padding:4px 12px;border-radius:50px;font-size:12px;font-weight:700}
.s-pending{background:var(--yellow-light);color:var(--yellow)}
.s-cooking{background:var(--orange-light);color:var(--orange)}
.s-delivering{background:var(--blue-light);color:var(--blue)}
.s-delivered{background:var(--green-light);color:var(--green)}
.s-cancelled{background:var(--red-light);color:var(--red)}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--navy);color:#fff;padding:12px 24px;border-radius:50px;font-size:14px;font-weight:600;z-index:500;transition:transform .3s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--green)}

/* NOTIFICATION BELL */
.notif-dot{width:8px;height:8px;background:var(--red);border-radius:50%;position:absolute;top:6px;right:6px;display:none}
.notif-dot.show{display:block}

@media(max-width:768px){
  .product-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
  .cart-panel{width:100%}
  .shop-hero h1{font-size:26px}
}
</style>
</head>
<body>

<nav>
  <div class="nav-brand">Bếp<span>Ngon</span> 🍜</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="setPage('shop')">🛍️ Đặt hàng</button>
    <button class="nav-tab" onclick="setPage('myorders')">📦 Đơn của tôi</button>
  </div>
  <button class="nav-cart" onclick="toggleCart()">
    🛒 Giỏ hàng <span class="cart-badge" id="cartBadge">0</span>
  </button>
</nav>

<!-- SHOP -->
<div class="page active" id="page-shop">
  <div class="shop-hero">
    <h1>Đồ ăn ngon, <span>giao tận nơi</span> 🚀</h1>
    <p>Hơn 50 món ăn từ các bếp gia truyền TPHCM</p>
    <div class="shop-search">
      <input type="text" placeholder="Tìm món ăn..." id="searchInput" oninput="filterProducts()">
      <button onclick="filterProducts()">Tìm</button>
    </div>
  </div>
  <div class="shop-body">
    <div class="category-bar" id="catBar"></div>
    <div class="product-grid" id="productGrid"></div>
  </div>
</div>

<!-- CHECKOUT -->
<div class="page" id="page-checkout">
  <div class="checkout-wrap">
    <button class="btn-back" onclick="setPage('shop')">← Quay lại</button>
    <div class="checkout-card">
      <h2>🧾 Xác nhận đơn hàng</h2>
      <div class="checkout-summary" id="checkoutSummary"></div>
      <div class="form-group"><label>Họ tên</label><input type="text" id="ckName" placeholder="Nguyễn Văn A"></div>
      <div class="form-group"><label>Số điện thoại</label><input type="tel" id="ckPhone" placeholder="0901 234 567"></div>
      <div class="form-group"><label>Địa chỉ giao hàng</label><input type="text" id="ckAddr" placeholder="123 Đường ABC, Quận 1, TP.HCM"></div>
      <div class="form-group"><label>Ghi chú (không bắt buộc)</label><textarea id="ckNote" placeholder="VD: Ít cay, không hành..."></textarea></div>
      <button class="btn-place" onclick="placeOrder()">🎉 Đặt hàng ngay</button>
    </div>
  </div>
</div>

<!-- TRACKING -->
<div class="page" id="page-tracking">
  <div class="tracking-wrap">
    <div class="tracking-card">
      <div class="tracking-header">
        <div>
          <h2>Theo dõi đơn hàng <span class="live-badge">● LIVE</span></h2>
          <div id="trackOrderId" style="margin-top:6px"></div>
        </div>
      </div>
      <div class="tracking-eta" id="trackingEta"></div>
      <div class="tracking-steps" id="trackingSteps"></div>
    </div>
    <div class="tracking-card">
      <div id="shipperInfo"></div>
      <div class="order-items-summary" id="trackItemsSummary"></div>
    </div>
    <button style="display:block;width:100%;background:none;border:1.5px solid var(--gray-border);padding:14px;border-radius:var(--radius);font-family:inherit;font-size:15px;cursor:pointer;color:var(--text-muted);font-weight:600;margin-bottom:32px" onclick="setPage('myorders')">← Xem tất cả đơn hàng</button>
  </div>
</div>

<!-- MY ORDERS -->
<div class="page" id="page-myorders">
  <div class="orders-wrap">
    <h2>📦 Đơn hàng của tôi</h2>
    <div id="myOrdersList"></div>
  </div>
</div>

<!-- CART -->
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<div class="cart-panel" id="cartPanel">
  <div class="cart-header"><h3>🛒 Giỏ hàng</h3><button class="cart-close" onclick="toggleCart()">✕</button></div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer" id="cartFooter"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ====== CONSTANTS ======
const STORAGE_KEY = 'bepngon_orders';
const PRODUCTS_KEY = 'bepngon_products';
const STATUSES = {
  pending:    {label:'Chờ xác nhận',    cls:'s-pending',    icon:'⏳'},
  confirmed:  {label:'Đã xác nhận',     cls:'s-cooking',    icon:'✅'},
  cooking:    {label:'Đang nấu',         cls:'s-cooking',    icon:'👨‍🍳'},
  shipper:    {label:'Shipper đã nhận',  cls:'s-delivering', icon:'🚴'},
  delivering: {label:'Đang giao hàng',   cls:'s-delivering', icon:'📦'},
  delivered:  {label:'Đã giao',          cls:'s-delivered',  icon:'🎉'},
  cancelled:  {label:'Đã huỷ',           cls:'s-cancelled',  icon:'❌'}
};
const STATUS_ORDER = ['pending','confirmed','cooking','shipper','delivering','delivered'];
const TRACKING_STEPS = [
  {key:'pending',    title:'Đơn hàng đã đặt',        desc:'Chúng tôi đã nhận được đơn hàng của bạn',      icon:'📝'},
  {key:'confirmed',  title:'Đơn đã được xác nhận',   desc:'Nhà bếp đã xác nhận và chuẩn bị nguyên liệu',  icon:'✅'},
  {key:'cooking',    title:'Đang nấu',                desc:'Đầu bếp đang chế biến món ăn của bạn',          icon:'👨‍🍳'},
  {key:'shipper',    title:'Shipper đã nhận đơn',     desc:'Shipper đã lấy hàng và sắp xuất phát',          icon:'🚴'},
  {key:'delivering', title:'Đang trên đường tới bạn', desc:'Shipper đang giao hàng đến địa chỉ của bạn',   icon:'🏍️'},
  {key:'delivered',  title:'Đã giao thành công! 🎉', desc:'Cảm ơn bạn đã tin dùng BếpNgon!',              icon:'🎉'},
];

const DEFAULT_PRODUCTS = [
  {id:1, name:'Phở Bò Tái',         desc:'Phở Nam bộ truyền thống, nước dùng 8 tiếng',    price:65000, emoji:'🍜', cat:'Phở & Bún',    badge:'Bán chạy'},
  {id:2, name:'Bún Bò Huế',         desc:'Cay nồng đặc trưng, thịt bò mềm',               price:55000, emoji:'🍲', cat:'Phở & Bún',    badge:''},
  {id:3, name:'Cơm Tấm Sườn',       desc:'Sườn nướng than hoa, cơm tấm dẻo thơm',         price:70000, emoji:'🍚', cat:'Cơm',          badge:'Bán chạy'},
  {id:4, name:'Cơm Gà Hội An',      desc:'Gà ta luộc, cơm nấu nước dùng gà',              price:75000, emoji:'🍗', cat:'Cơm',          badge:''},
  {id:5, name:'Bánh Mì Thịt Nướng', desc:'Bánh mì nóng giòn, thịt nướng mật ong',         price:35000, emoji:'🥖', cat:'Bánh mì',      badge:'Mới'},
  {id:6, name:'Hủ Tiếu Nam Vang',   desc:'Hủ tiếu dai, thịt băm, tôm tươi',               price:60000, emoji:'🍝', cat:'Phở & Bún',    badge:''},
  {id:7, name:'Bò Lúc Lắc',         desc:'Bò Mỹ thăn lưng, xào hành tây',                 price:120000,emoji:'🥩', cat:'Món xào',      badge:'Premium'},
  {id:8, name:'Trà Sữa Trân Châu',  desc:'Trà sữa Đài Loan, trân châu đường đen',          price:45000, emoji:'🧋', cat:'Đồ uống',      badge:''},
  {id:9, name:'Nước Mía Sầu Riêng', desc:'Nước mía tươi kết hợp sầu riêng nguyên chất',   price:35000, emoji:'🥤', cat:'Đồ uống',      badge:''},
  {id:10,name:'Gỏi Cuốn Tôm Thịt', desc:'Gỏi cuốn tươi, tôm sú, thịt luộc, rau thơm',   price:50000, emoji:'🌯', cat:'Khai vị',      badge:''},
  {id:11,name:'Chả Giò Rế',         desc:'Chả giò giòn rụm, nhân thịt cua',               price:55000, emoji:'🥟', cat:'Khai vị',      badge:'Bán chạy'},
  {id:12,name:'Chè Đậu Xanh',       desc:'Chè đậu xanh nấu cốt dừa, ăn nóng hoặc lạnh',  price:25000, emoji:'🍧', cat:'Tráng miệng',  badge:''},
];

// ====== STATE ======
let cart = [];
let trackingOrderId = null;
let currentPage = 'shop';
let pollingInterval = null;

// ====== STORAGE ======
function getOrders(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); }catch(e){return [];} }
function saveOrders(orders){ localStorage.setItem(STORAGE_KEY, JSON.stringify(orders)); }
function getProducts(){ 
  try{ 
    const stored = JSON.parse(localStorage.getItem(PRODUCTS_KEY)||'null');
    return stored || DEFAULT_PRODUCTS;
  }catch(e){ return DEFAULT_PRODUCTS; }
}

// ====== UTILS ======
function fmt(n){ return new Intl.NumberFormat('vi-VN').format(n) + 'đ'; }
function showToast(msg, type=''){
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast'+(type?' '+type:'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}
function timestamp(){ return new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}); }

// ====== PAGE NAV ======
function setPage(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  if(p==='shop') document.querySelectorAll('.nav-tab')[0].classList.add('active');
  if(p==='myorders'){ document.querySelectorAll('.nav-tab')[1].classList.add('active'); renderMyOrders(); }
  if(p==='tracking') renderTracking();
  currentPage = p;
}

// ====== PRODUCTS ======
function renderShop(){
  const products = getProducts();
  const cats = ['Tất cả', ...new Set(products.map(p=>p.cat))];
  document.getElementById('catBar').innerHTML = cats.map((c,i)=>
    `<button class="cat-btn${i===0?' active':''}" onclick="selectCat('${c}',this)">${c}</button>`
  ).join('');
  renderProductGrid('Tất cả');
}
function selectCat(cat, btn){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderProductGrid(cat);
}
function filterProducts(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  const products = getProducts();
  const filtered = q ? products.filter(p=>p.name.toLowerCase().includes(q)||p.desc.toLowerCase().includes(q)) : products;
  document.getElementById('productGrid').innerHTML = filtered.map(productCardHTML).join('');
}
function renderProductGrid(cat){
  const products = getProducts();
  const filtered = cat==='Tất cả' ? products : products.filter(p=>p.cat===cat);
  document.getElementById('productGrid').innerHTML = filtered.map(productCardHTML).join('');
}
function productCardHTML(p){
  return `<div class="product-card">
    <div class="product-img">${p.emoji}</div>
    <div class="product-info">
      ${p.badge?`<span class="product-badge">${p.badge}</span>`:''}
      <div class="product-name">${p.name}</div>
      <div class="product-desc">${p.desc}</div>
      <div class="product-footer">
        <span class="product-price">${fmt(p.price)}</span>
        <button class="btn-add" onclick="addToCart(${p.id})">+</button>
      </div>
    </div>
  </div>`;
}

// ====== CART ======
function addToCart(id){
  const products = getProducts();
  const p = products.find(x=>x.id===id);
  if(!p) return;
  const existing = cart.find(x=>x.id===id);
  if(existing) existing.qty++;
  else cart.push({...p, qty:1});
  updateCartUI();
  showToast(`Đã thêm ${p.emoji} ${p.name}!`);
}
function removeFromCart(id){ cart = cart.filter(x=>x.id!==id); updateCartUI(); }
function changeQty(id, delta){
  const item = cart.find(x=>x.id===id);
  if(!item) return;
  item.qty += delta;
  if(item.qty<=0) removeFromCart(id);
  else updateCartUI();
}
function cartTotal(){ return cart.reduce((s,i)=>s+i.price*i.qty, 0); }
function updateCartUI(){
  const total = cart.reduce((s,i)=>s+i.qty, 0);
  document.getElementById('cartBadge').textContent = total;
  renderCartPanel();
}
function renderCartPanel(){
  const ci = document.getElementById('cartItems');
  const cf = document.getElementById('cartFooter');
  if(cart.length===0){
    ci.innerHTML = `<div class="cart-empty"><div class="icon">🛒</div><p>Giỏ hàng trống</p><p style="font-size:13px;color:var(--text-muted)">Thêm món ngon nhé!</p></div>`;
    cf.innerHTML = ''; return;
  }
  ci.innerHTML = cart.map(item=>`
    <div class="cart-item">
      <div class="cart-item-emoji">${item.emoji}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">${fmt(item.price)}</div>
        <div class="cart-qty">
          <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
        </div>
      </div>
      <button class="cart-item-remove" onclick="removeFromCart(${item.id})">🗑</button>
    </div>
  `).join('');
  cf.innerHTML = `
    <div class="cart-total"><span>Tổng cộng</span><span>${fmt(cartTotal())}</span></div>
    <button class="btn-checkout" onclick="goCheckout()">Đặt hàng →</button>
  `;
}
function toggleCart(){
  document.getElementById('cartOverlay').classList.toggle('open');
  document.getElementById('cartPanel').classList.toggle('open');
}
function goCheckout(){
  if(cart.length===0){showToast('Giỏ hàng trống!');return;}
  document.getElementById('cartOverlay').classList.remove('open');
  document.getElementById('cartPanel').classList.remove('open');
  renderCheckoutSummary();
  setPage('checkout');
}
function renderCheckoutSummary(){
  const rows = cart.map(i=>`
    <div class="checkout-item-row"><span>${i.emoji} ${i.name} × ${i.qty}</span><span>${fmt(i.price*i.qty)}</span></div>
  `).join('');
  document.getElementById('checkoutSummary').innerHTML = `
    <h4>Đơn hàng của bạn</h4>${rows}
    <div class="checkout-item-row"><span>Phí ship</span><span>${fmt(20000)}</span></div>
    <hr class="checkout-divider">
    <div class="checkout-total-row"><span>Tổng thanh toán</span><span>${fmt(cartTotal()+20000)}</span></div>
  `;
}

// ====== PLACE ORDER ======
function placeOrder(){
  const name = document.getElementById('ckName').value.trim();
  const phone = document.getElementById('ckPhone').value.trim();
  const addr = document.getElementById('ckAddr').value.trim();
  if(!name||!phone||!addr){ showToast('Vui lòng điền đầy đủ thông tin!'); return; }
  
  const orders = getOrders();
  const newId = orders.length > 0 ? Math.max(...orders.map(o=>parseInt(o.id.replace('#BN','')))) + 1 : 1;
  const orderId = '#BN' + String(newId).padStart(3,'0');
  
  const newOrder = {
    id: orderId,
    customer: name, phone, address: addr,
    note: document.getElementById('ckNote').value.trim(),
    items: cart.map(i=>({...i})),
    status: 'pending',
    time: timestamp(),
    date: new Date().toLocaleDateString('vi-VN'),
    shipper: '',
    statusHistory: [{status:'pending', time: timestamp()}]
  };
  
  orders.unshift(newOrder);
  saveOrders(orders);
  
  // Trigger storage event for admin page
  localStorage.setItem('bepngon_new_order', JSON.stringify({id: orderId, time: Date.now()}));
  
  cart = [];
  updateCartUI();
  document.getElementById('ckName').value='';
  document.getElementById('ckPhone').value='';
  document.getElementById('ckAddr').value='';
  document.getElementById('ckNote').value='';
  
  showToast('Đặt hàng thành công! 🎉','success');
  trackingOrderId = orderId;
  setPage('tracking');
  startPolling(orderId);
}

// ====== TRACKING ======
function renderTracking(){
  const orders = getOrders();
  const o = orders.find(x=>x.id===trackingOrderId);
  if(!o) return;
  
  document.getElementById('trackOrderId').innerHTML = `<span class="order-id-badge">${o.id}</span> <span style="font-size:13px;color:var(--text-muted)">Đặt lúc ${o.time}</span>`;
  renderTrackingSteps(o);
  renderTrackItemsSummary(o);
  renderETA(o);
  renderShipperInfo(o);
}

function renderETA(o){
  const etaMap={pending:'~35 phút',confirmed:'~28 phút',cooking:'~20 phút',shipper:'~15 phút',delivering:'~5 phút',delivered:'Đã giao thành công!'};
  document.getElementById('trackingEta').innerHTML = `
    <div class="eta-icon">${o.status==='delivered'?'🎉':'🚀'}</div>
    <div>
      <div class="eta-label">Thời gian dự kiến</div>
      <div class="eta-time">${etaMap[o.status]||'~30 phút'}</div>
    </div>
    ${o.status!=='delivered'?`<div style="margin-left:auto;font-size:12px;color:var(--green);font-weight:600">● Đang cập nhật live</div>`:''}
  `;
}

function renderShipperInfo(o){
  const el = document.getElementById('shipperInfo');
  if(o.shipper && ['shipper','delivering','delivered'].includes(o.status)){
    el.innerHTML = `<div style="background:var(--blue-light);border-radius:var(--radius-lg);padding:16px 20px;display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <span style="font-size:32px">🚴</span>
      <div><div style="font-size:13px;color:var(--blue);font-weight:700">SHIPPER CỦA BẠN</div><div style="font-weight:700;font-size:16px">${o.shipper}</div><div style="font-size:12px;color:var(--text-muted)">Đang giao đến: ${o.address}</div></div>
    </div>`;
  } else {
    el.innerHTML = '';
  }
}

function renderTrackingSteps(o){
  const idx = STATUS_ORDER.indexOf(o.status);
  document.getElementById('trackingSteps').innerHTML = TRACKING_STEPS.map((step,i)=>{
    const si = STATUS_ORDER.indexOf(step.key);
    let cls = '';
    if(si < idx) cls = 'done';
    else if(si === idx) cls = 'active';
    const hist = o.statusHistory?.find(h=>h.status===step.key);
    return `<div class="tracking-step ${cls}">
      <div class="step-icon">${cls==='done'?'✅':step.icon}</div>
      <div class="step-content">
        <div class="step-title">${step.title}</div>
        <div class="step-desc">${step.desc}</div>
        ${hist?`<div class="step-time">⏰ ${hist.time}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function renderTrackItemsSummary(o){
  const total = o.items.reduce((s,i)=>s+i.price*i.qty, 0);
  document.getElementById('trackItemsSummary').innerHTML = `
    <h4>Món đã đặt</h4>
    ${o.items.map(i=>`<div class="order-item-chip"><span class="oi-emoji">${i.emoji}</span><span class="oi-name">${i.name} × ${i.qty}</span><span class="oi-price">${fmt(i.price*i.qty)}</span></div>`).join('')}
    <div style="border-top:1px solid var(--gray-border);margin-top:12px;padding-top:12px;display:flex;justify-content:space-between;font-weight:700">
      <span>Tổng cộng</span><span style="color:var(--orange)">${fmt(total+20000)}</span>
    </div>
    <div style="font-size:12px;color:var(--text-muted);text-align:right;margin-top:2px">(bao gồm phí ship 20.000đ)</div>
  `;
}

// ====== POLLING (live sync from admin) ======
function startPolling(orderId){
  if(pollingInterval) clearInterval(pollingInterval);
  let lastStatus = '';
  pollingInterval = setInterval(()=>{
    const orders = getOrders();
    const o = orders.find(x=>x.id===orderId);
    if(!o) return;
    if(o.status !== lastStatus){
      lastStatus = o.status;
      if(currentPage==='tracking' && trackingOrderId===orderId){
        renderTracking();
      }
      if(o.status==='delivered'){
        showToast('🎉 Đơn hàng đã được giao thành công!','success');
        clearInterval(pollingInterval);
      }
      if(['shipper','delivering'].includes(o.status)){
        showToast(`${STATUSES[o.status].icon} ${STATUSES[o.status].label}`);
      }
    }
  }, 2000);
}

// ====== MY ORDERS ======
function renderMyOrders(){
  const orders = getOrders();
  if(orders.length===0){
    document.getElementById('myOrdersList').innerHTML = `<div style="text-align:center;padding:80px 0;color:var(--text-muted)"><div style="font-size:48px;margin-bottom:16px">📦</div><p style="font-size:18px;font-weight:600">Chưa có đơn hàng nào</p><p style="margin-top:8px">Hãy đặt món ngon đầu tiên!</p></div>`;
    return;
  }
  document.getElementById('myOrdersList').innerHTML = orders.map(o=>{
    const s = STATUSES[o.status];
    const total = o.items.reduce((sum,i)=>sum+i.price*i.qty, 0) + 20000;
    const names = o.items.map(i=>`${i.emoji} ${i.name}`).join(', ');
    return `<div class="order-row" onclick="viewOrder('${o.id}')">
      <div class="order-row-info">
        <div class="order-row-id">${o.id} • ${o.time} — ${o.date||''}</div>
        <div class="order-row-items">${names}</div>
        <div class="order-row-date">📍 ${o.address}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="order-row-total">${fmt(total)}</div>
        <span class="status-pill ${s.cls}">${s.icon} ${s.label}</span>
      </div>
    </div>`;
  }).join('');
}

function viewOrder(id){
  trackingOrderId = id;
  startPolling(id);
  setPage('tracking');
}

// Listen for storage changes from admin (cross-tab)
window.addEventListener('storage', (e)=>{
  if(e.key === STORAGE_KEY){
    if(currentPage==='tracking' && trackingOrderId){
      renderTracking();
    }
    if(currentPage==='myorders') renderMyOrders();
  }
});

// ====== INIT ======
renderShop();
renderCartPanel();
</script>
</body>
</html>
